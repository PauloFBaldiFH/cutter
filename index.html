        function normalizar(texto) {
            if (!texto) return "";
            return texto.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-zA-Z]/g, "").toUpperCase();
        }

        function prepararTabela(tabela) {
            let tabelaNormalizada = {};
            for (let chave in tabela) { tabelaNormalizada[normalizar(chave)] = tabela[chave]; }
            return [Object.keys(tabelaNormalizada).sort(), tabelaNormalizada];
        }

        const [CHAVES_ORDENADAS, TABELA_NORMALIZADA] = prepararTabela(TABELA_CUTTER);

        function encontrarCodigoCutter(sobrenome) {
            if (!sobrenome) return "Inválido";
            let nomeNormalizado = normalizar(sobrenome);
            let pos = CHAVES_ORDENADAS.findIndex(c => c > nomeNormalizado);
            if (pos === -1) pos = CHAVES_ORDENADAS.length;
            if (pos === 0) return nomeNormalizado[0] + "11";
            return TABELA_NORMALIZADA[CHAVES_ORDENADAS[pos - 1]];
        }

        document.addEventListener("DOMContentLoaded", function() {
            const container = document.getElementById("cutter-calculadora");
            container.innerHTML = `
                <h2>Calculadora Cutter - Biblioteca Castro Alves - Palotina</h2>
                <input type="text" id="sobrenome" placeholder="Digite o sobrenome do autor...">
                <button id="btnCutter">GERAR CÓDIGO</button>
                <div id="resultado"></div>
            `;

            const input = document.getElementById("sobrenome");
            const btn = document.getElementById("btnCutter");

           function processar() {
                const sobrenome = input.value;
                const codigo = encontrarCodigoCutter(sobrenome);
                const resultadoDiv = document.getElementById("resultado");

                if (codigo !== "Inválido" && sobrenome) {
                    resultadoDiv.innerHTML = `
                        <div style="padding:15px; background:#e9f5e9; border-left:5px solid #4CAF50; text-align:center;">
                            <div style="font-size:1.1em; margin-bottom:10px;">Código para <strong>${sobrenome}</strong>:</div>
                            <div id="cutter-texto" style="color:#d9534f; font-weight:bold; font-size:2.5em; margin-bottom:15px;">${codigo}</div>
                            <button id="btnCopiar" style="background:#007bff; width:auto; padding:8px 20px;">COPIAR CÓDIGO</button>
                        </div>`;

                    // Lógica para copiar o texto
                    document.getElementById("btnCopiar").addEventListener("click", function() {
                        const texto = document.getElementById("cutter-texto").innerText;
                        navigator.clipboard.writeText(texto).then(() => {
                            this.innerText = "COPIADO!";
                            this.style.background = "#28a745";
                            setTimeout(() => {
                                this.innerText = "COPIAR CÓDIGO";
                                this.style.background = "#007bff";
                            }, 2000);
                        });
                    });
                } else {
                    resultadoDiv.innerHTML = "";
                }
            }

            btn.addEventListener("click", processar);
            input.addEventListener("keypress", (e) => { if(e.key === 'Enter') processar(); });
        });
    </script>
